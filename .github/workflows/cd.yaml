name: CD

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:

  sonar:
    name: SonarQube Analysis
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Sonar Scanner
        run: |
          /opt/sonar-scanner/bin/sonar-scanner \
            -Dsonar.projectKey=goapp \
            -Dsonar.sources=. \
            -Dsonar.host.url=http://192.168.100.6:9000 \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.branch.name=main

  build:
    name: Build & Push Docker Image
    runs-on: self-hosted
    needs: sonar

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: matias1210/argocd-estudos:${{ github.sha }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Kustomize
        run: |
          curl -s https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh | bash
          sudo mv kustomize /usr/local/bin/

      - name: Update k8s image
        run: |
          cd k8s
          kustomize edit set image goapp=matias1210/argocd-estudos:${{ github.sha }}

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Deploy Action"
          git add k8s/kustomization.yaml
          git diff --cached --quiet || git commit -m "update image tag"

      - name: Push changes
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
          